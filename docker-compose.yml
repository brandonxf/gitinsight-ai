services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gitinsight}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gitinsight}
      POSTGRES_DB: ${POSTGRES_DB:-gitinsight}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gitinsight}"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
      dockerfile: ../infra/docker/backend.Dockerfile
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - repos_cache:/data/repos_cache
    expose:
      - "8000"
    ports:
      - "8000:8000"

  worker:
    build:
      context: ./backend
      dockerfile: ../infra/docker/worker.Dockerfile
    command: celery -A app.workers.celery_app.celery worker --loglevel=INFO --queues=analysis,embeddings,maintenance --concurrency=2
    env_file: .env
    depends_on:
      - backend
      - redis
    volumes:
      - repos_cache:/data/repos_cache

  beat:
    build:
      context: ./backend
      dockerfile: ../infra/docker/worker.Dockerfile
    command: celery -A app.workers.celery_app.celery beat --loglevel=INFO
    env_file: .env
    depends_on:
      - redis

  flower:
    build:
      context: ./backend
      dockerfile: ../infra/docker/worker.Dockerfile
    command: celery -A app.workers.celery_app.celery flower --port=5555
    env_file: .env
    depends_on:
      - redis
    ports:
      - "5555:5555"

  frontend:
    build:
      context: ./frontend
      dockerfile: ../infra/docker/frontend.Dockerfile
    expose:
      - "5173"

  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    ports:
      - "8080:80"

  # LLM local gratuito. Opcional: activar con `--profile llm`.
  # En modo Groq (free tier) no es necesario levantarlo.
  ollama:
    image: ollama/ollama:latest
    profiles: ["llm"]
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"

volumes:
  postgres_data:
  repos_cache:
  ollama_data:
